---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-server
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asset-server
  template:
    metadata:
      labels:
        app: asset-server
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: asset-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: asset-volume
          configMap:
            name: sensu-asset
            defaultMode: 0644

---
apiVersion: v1
kind: Service
metadata:
  name: asset-server
  namespace: observability
spec:
  selector:
    app: asset-server
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensu-backend
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensu-backend
  template:
    metadata:
      labels:
        app: sensu-backend
    spec:
      containers:
        - name: sensu-backend
          image: sensu/sensu:latest
          command: ["sensu-backend", "start", "--state-dir=/var/lib/sensu/sensu-backend"]
          env:
            - name: SENSU_BACKEND_CLUSTER_ADMIN_USERNAME
              value: "admin"
            - name: SENSU_BACKEND_CLUSTER_ADMIN_PASSWORD
              value: "AdminPassword123!"
          ports:
            - containerPort: 8080
            - containerPort: 8081
            - containerPort: 8082
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: sensu-data
              mountPath: /var/lib/sensu/sensu-backend
      volumes:
        - name: sensu-data
          persistentVolumeClaim:
            claimName: sensu-backend-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: sensu-backend
  namespace: observability
spec:
  selector:
    app: sensu-backend
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: webui
      port: 8081
      targetPort: 8081
    - name: agent
      port: 8082
      targetPort: 8082

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensu-agent
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensu-agent
  template:
    metadata:
      labels:
        app: sensu-agent
    spec:
      containers:
        - name: sensu-agent
          image: sensu/sensu:latest
          command: ["sh", "-c", "apk add --no-cache curl && sensu-agent start --backend-url=ws://sensu-backend:8081 --subscriptions=elasticsearch"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sensu-backend-pvc
  namespace: observability
spec:
  storageClassName: gp2
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi