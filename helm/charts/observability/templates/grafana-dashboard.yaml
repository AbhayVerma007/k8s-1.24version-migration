apiVersion: v1
kind: ConfigMap
metadata:
  name: smalllinks-grafana-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  smalllinks-dashboard.json: |-
    {
      "title": "Smalllinks Production Overview",
      "tags": ["smalllinks", "sre", "golden-signals"],
      "timezone": "browser",
      "refresh": "10s",
      "schemaVersion": 36,
      "panels": [
        {
          "type": "stat",
          "title": "Global Error Rate (5xx)",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.05 }] }, "color": { "mode": "thresholds" } } }
        },
        {
          "type": "stat",
          "title": "Current Traffic (RPS)",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(rate(http_requests_total[1m]))" }],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "value", "fixedColor": "blue" } } }
        },
        {
          "type": "stat",
          "title": "Redis Cache Hit Ratio",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(rate(redis_hits_total[5m])) / (sum(rate(redis_hits_total[5m])) + sum(rate(redis_misses_total[5m])))" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 0.5 }, { "color": "green", "value": 0.8 }] }, "color": { "mode": "thresholds" } } }
        },
        {
          "type": "stat",
          "title": "Active Pods",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "count(kube_pod_info{namespace=\"app\", pod=~\"smalllinks-.*\"})" }],
          "fieldConfig": { "defaults": { "color": { "mode": "value", "fixedColor": "purple" } } }
        },
        {
          "type": "timeseries",
          "title": "Traffic Trends by Route (RPS)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [{ "expr": "sum by (route) (rate(http_requests_total[1m]))", "legendFormat": "{{ "{{route}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 15, "lineInterpolation": "smooth" } } }
        },
        {
          "type": "timeseries",
          "title": "API Latency (95th Percentile)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le, route) (rate(http_request_duration_seconds_bucket[1m])))", "legendFormat": "{{ "{{route}}" }} p95" }],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 15, "lineInterpolation": "smooth" } } }
        },
        {
          "type": "timeseries",
          "title": "Pod Memory Usage (Working Set)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "targets": [{ "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"app\", pod=~\"smalllinks-.*\", container!=\"\"})", "legendFormat": "{{ "{{pod}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "drawStyle": "line", "fillOpacity": 25 } } }
        },
        {
          "type": "timeseries",
          "title": "Pod CPU Utilization (Cores)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "targets": [{ "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"app\", pod=~\"smalllinks-.*\", container!=\"\"}[1m]))", "legendFormat": "{{ "{{pod}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "none", "custom": { "drawStyle": "line", "fillOpacity": 25 } } }
        },
        {
          "type": "gauge",
          "title": "Node Group CPU (%)",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 21 },
          "targets": [{ "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "legendFormat": "{{ "{{instance}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 75 }, { "color": "red", "value": 90 }] } } }
        },
        {
          "type": "gauge",
          "title": "Node Group Memory (%)",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 21 },
          "targets": [{ "expr": "100 * (1 - ((avg_over_time(node_memory_MemFree_bytes[5m]) + avg_over_time(node_memory_Cached_bytes[5m]) + avg_over_time(node_memory_Buffers_bytes[5m])) / avg_over_time(node_memory_MemTotal_bytes[5m])))", "legendFormat": "{{ "{{instance}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 80 }, { "color": "red", "value": 90 }] } } }
        }
      ]
    }