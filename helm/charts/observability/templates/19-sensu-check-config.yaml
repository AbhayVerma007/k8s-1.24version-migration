apiVersion: v1
kind: ConfigMap
metadata:
  name: sensu-custom-checks
  namespace: observability
data:
  check.yaml: |
    type: CheckConfig
    api_version: core/v2
    metadata:
      name: filebeat-error-alert
      namespace: default
    spec:
      command: >-
        COUNT=$(curl -s -X GET "http://elasticsearch.observability.svc.cluster.local:9200/filebeat-*/_search" -H 'Content-Type: application/json' -d '{"query":{"bool":{"must":[{"match":{"log.level":"error"}},{"range":{"@timestamp":{"gte":"now-5m"}}}]}},"size":0}' | grep -o '"value":[0-9]*' | awk -F':' '{print $2}'); 
        if [ -z "$COUNT" ]; then echo "UNKNOWN: Failed to query Elasticsearch"; exit 3; fi; 
        if [ "$COUNT" -gt 10 ]; then echo "CRITICAL: $COUNT error logs found in the last 5m!"; exit 2; else echo "OK: Only $COUNT error logs found."; exit 0; fi
      subscriptions:
        - elasticsearch
      publish: true
      interval: 60
      handlers: []