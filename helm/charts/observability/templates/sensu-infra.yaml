# --- ServiceAccount & RBAC for Global Monitoring ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensu-agent-sa
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sensu-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sensu-agent-binding
subjects:
  - kind: ServiceAccount
    name: sensu-agent-sa
    namespace: observability
roleRef:
  kind: ClusterRole
  name: sensu-agent-role
  apiGroup: rbac.authorization.k8s.io

# --- Asset Server ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-server
  namespace: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asset-server
  template:
    metadata:
      labels:
        app: asset-server
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - asset-server
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
      volumes:
        - name: asset-volume
          configMap:
            name: sensu-asset
            defaultMode: 0644
---
apiVersion: v1
kind: Service
metadata:
  name: asset-server
  namespace: observability
spec:
  selector:
    app: asset-server
  ports:
    - port: 80
      targetPort: 80

# --- Sensu Backend ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensu-backend
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensu-backend
  template:
    metadata:
      labels:
        app: sensu-backend
    spec:
      nodeSelector:
        kops.k8s.io/instancegroup: memory-workers
      containers:
        - name: sensu-backend
          image: sensu/sensu:latest
          command: ["sensu-backend", "start", "--state-dir=/var/lib/sensu/sensu-backend"]
          env:
            - name: SENSU_BACKEND_CLUSTER_ADMIN_USERNAME
              value: "admin"
            - name: SENSU_BACKEND_CLUSTER_ADMIN_PASSWORD
              value: "AdminPassword123!"
          volumeMounts:
            - name: sensu-data
              mountPath: /var/lib/sensu/sensu-backend
      volumes:
        - name: sensu-data
          persistentVolumeClaim:
            claimName: sensu-backend-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sensu-backend
  namespace: observability
spec:
  selector:
    app: sensu-backend
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: webui
      port: 8081
      targetPort: 8081
    - name: agent
      port: 8082
      targetPort: 8082

# --- Sensu Agent (Globally Subscribed) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensu-agent
  namespace: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensu-agent
  template:
    metadata:
      labels:
        app: sensu-agent
    spec:
      serviceAccountName: sensu-agent-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - sensu-agent
              topologyKey: kubernetes.io/hostname
      containers:
        - name: sensu-agent
          image: sensu/sensu:latest
          # Subscription is now 'kubernetes' for global cluster coverage
          command: ["sh", "-c", "apk add --no-cache curl && sensu-agent start --backend-url=ws://sensu-backend:8081 --subscriptions=kubernetes"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sensu-backend-pvc
  namespace: observability
spec:
  storageClassName: gp2
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi