apiVersion: v1
kind: Service
metadata:
  name: smalllinks-frontend
  namespace: app
  labels:
    app: smalllinks
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8201
      protocol: TCP
      name: http
  selector:
    app: smalllinks

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smalllinks
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smalllinks
  template:
    metadata:
      labels:
        app: smalllinks
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8201"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: smalllinks
          image: "867490540548.dkr.ecr.us-east-1.amazonaws.com/smalllinks:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 8201
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /status
              port: 8201
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: 8201
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3