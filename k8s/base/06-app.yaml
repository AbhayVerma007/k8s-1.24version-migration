---
# ADD: LoadBalancer Service (MISSING!)
apiVersion: v1
kind: Service
metadata:
  name: kutt-frontend
  namespace: app
  labels:
    app: kutt
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: kutt

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kutt
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kutt
  template:
    metadata:
      labels:
        app: kutt
      # ADD: Prometheus annotations (Phase 2)
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kutt
          # REPLACE: <your-account-id> with your actual AWS account ID or use variable
          image: "867490540548.dkr.ecr.us-east-1.amazonaws.com/devops-app:latest"
          imagePullPolicy: Always  # ADD: Always pull latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: postgres-secret
          # ADD: Resource requests/limits (REQUIRED)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # FIX: livenessProbe - use / which should always exist
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # FIXED: readinessProbe
          # NOTE: If Kutt doesn't have /healthz, change to /
          readinessProbe:
            httpGet:
              path: /healthz            # Changed from /healthz if it doesn't exist
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3